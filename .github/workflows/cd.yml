name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy the published images to the configured Kubernetes cluster
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  BACKEND_IMAGE: ghcr.io/hessam-hosseinian/event-ticketing-backend
  FRONTEND_IMAGE: ghcr.io/hessam-hosseinian/event-ticketing-frontend

jobs:
  prepare:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.revision.outputs.sha }}
      short_sha: ${{ steps.revision.outputs.short_sha }}
    steps:
      - id: revision
        env:
          REVISION: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          echo "sha=$REVISION" >> "$GITHUB_OUTPUT"
          echo "short_sha=${REVISION::12}" >> "$GITHUB_OUTPUT"

  manifests:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - name: Validate Kubernetes resources
        uses: docker://ghcr.io/yannh/kubeconform:v0.6.7
        with:
          args: -strict -summary infra/k8s

  publish:
    needs: [prepare, manifests]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: backend
            image: ghcr.io/hessam-hosseinian/event-ticketing-backend
          - component: frontend
            context: frontend
            image: ghcr.io/hessam-hosseinian/event-ticketing-frontend
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish ${{ matrix.component }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ matrix.image }}:sha-${{ needs.prepare.outputs.short_sha }}
            ${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          provenance: mode=max
          sbom: true

  deploy:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy
    needs: [prepare, publish]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: azure/setup-kubectl@v5
      - name: Configure cluster credentials
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          test -n "$KUBE_CONFIG_DATA" || { echo "KUBE_CONFIG_DATA is required for deployment"; exit 1; }
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBE_CONFIG_DATA" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
      - name: Verify application secret
        run: kubectl get secret ticketing-secrets
      - name: Apply configuration and stateful dependencies
        run: |
          kubectl apply -f infra/k8s/configmap.yaml
          kubectl apply -f infra/k8s/postgres.yaml -f infra/k8s/redis.yaml -f infra/k8s/rabbitmq.yaml
      - name: Deploy immutable application images
        env:
          IMAGE_TAG: sha-${{ needs.prepare.outputs.short_sha }}
        run: |
          kubectl apply -f infra/k8s/backend-service.yaml -f infra/k8s/frontend-service.yaml
          kubectl apply -f infra/k8s/hpa.yaml -f infra/k8s/pod-disruption-budgets.yaml -f infra/k8s/ingress.yaml
          kubectl set image -f infra/k8s/backend-deployment.yaml backend="$BACKEND_IMAGE:$IMAGE_TAG" --local -o yaml | kubectl apply -f -
          kubectl set image -f infra/k8s/frontend-deployment.yaml frontend="$FRONTEND_IMAGE:$IMAGE_TAG" --local -o yaml | kubectl apply -f -
          kubectl rollout status deployment/backend --timeout=5m
          kubectl rollout status deployment/frontend --timeout=5m
