stages: [quality, security, package, extended, deploy]

default:
  interruptible: true
  cache:
    key:
      files: [backend/package-lock.json, frontend/package-lock.json]
    paths: [.npm/]

.node:
  image: node:22-alpine
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
    NODE_OPTIONS: "--max-old-space-size=1024"

backend-quality:
  extends: .node
  stage: quality
  script:
    - cd backend
    - npm ci --prefer-offline --no-audit
    - npm run lint
    - npm run test:cov -- --runInBand
    - npm run build
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    expire_in: 7 days
    paths: [backend/coverage/, backend/dist/]

frontend-quality:
  extends: .node
  stage: quality
  script:
    - cd frontend
    - npm ci --prefer-offline --no-audit
    - npm run lint
    - npm run build
  artifacts:
    expire_in: 7 days
    paths: [frontend/dist/]

dependency-audit:
  extends: .node
  stage: security
  script:
    - cd backend && npm audit --omit=dev --audit-level=high
    - cd ../frontend && npm audit --omit=dev --audit-level=high

terraform-validate:
  image:
    name: hashicorp/terraform:1.9
    entrypoint: [""]
  stage: security
  cache: []
  script:
    - terraform -chdir=infra/terraform fmt -check -recursive
    - terraform -chdir=infra/terraform init -backend=false
    - terraform -chdir=infra/terraform validate

container-build:
  image: docker:27
  stage: package
  services: [docker:27-dind]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build --pull -t ticketing-backend:$CI_COMMIT_SHA backend
    - docker build --pull -t ticketing-frontend:$CI_COMMIT_SHA frontend

mutation-test:
  extends: .node
  stage: extended
  resource_group: mutation-tests
  script:
    - cd backend
    - npm ci --prefer-offline --no-audit
    - npm run test:mutation
  artifacts:
    when: always
    expire_in: 14 days
    paths: [backend/reports/mutation/]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $RUN_MUTATION == "true"'
    - when: manual
      allow_failure: true

load-test:
  image: grafana/k6:0.54.0
  stage: extended
  resource_group: load-tests
  script: ["k6 run tests/load/k6-booking-test.js"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $LOAD_BASE_URL'
      variables: {BASE_URL: "$LOAD_BASE_URL"}
    - when: manual
      allow_failure: true

deploy-preview:
  image:
    name: bitnami/kubectl:1.31
    entrypoint: [""]
  stage: deploy
  cache: []
  script:
    - kubectl apply --dry-run=server -f infra/k8s/
  when: manual
  allow_failure: true
  environment:
    name: "preview/$CI_COMMIT_REF_SLUG"
