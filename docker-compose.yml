services:
  postgres:
    image: postgres:16-alpine
    environment: {POSTGRES_USER: ticketing, POSTGRES_PASSWORD: ticketing, POSTGRES_DB: ticketing}
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck: {test: ["CMD-SHELL","pg_isready -U ticketing"], interval: 5s, timeout: 3s, retries: 20}
  redis: {image: redis:7-alpine}
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports: ["15672:15672"]
  backend:
    build: ./backend
    environment: {DATABASE_URL: postgres://ticketing:ticketing@postgres:5432/ticketing, REDIS_URL: redis://redis:6379, RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672, JWT_SECRET: local-only-secret}
    ports: ["3000:3000"]
    depends_on: {postgres: {condition: service_healthy}, redis: {condition: service_started}, rabbitmq: {condition: service_started}}
  frontend:
    build: ./frontend
    environment: {VITE_API_URL: http://localhost:3000/api, VITE_WS_URL: http://localhost:3000}
    ports: ["5173:5173"]
    depends_on: [backend]
volumes: {postgres-data: {}}
