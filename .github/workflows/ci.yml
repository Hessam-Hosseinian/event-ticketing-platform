name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm, cache-dependency-path: backend/package-lock.json}
      - run: npm ci --no-audit
        working-directory: backend
      - run: npm run lint
        working-directory: backend
      - run: npm test -- --runInBand
        working-directory: backend
      - run: npm run build
        working-directory: backend
      - run: npm audit --omit=dev --audit-level=high
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm, cache-dependency-path: frontend/package-lock.json}
      - run: npm ci --no-audit
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm audit --omit=dev --audit-level=high
        working-directory: frontend

  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: {terraform_version: 1.9.8}
      - run: terraform fmt -check -recursive
        working-directory: infra/terraform
      - run: terraform init -backend=false
        working-directory: infra/terraform
      - run: terraform validate
        working-directory: infra/terraform

  delivery_config:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Validate Kubernetes resources
        uses: docker://ghcr.io/yannh/kubeconform:v0.6.7
        with:
          args: -strict -summary infra/k8s

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.component }} production image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component }}
          push: false
          cache-from: type=gha,scope=ci-${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=ci-${{ matrix.component }}

  quality_gate:
    name: quality-gate
    if: always()
    needs: [backend, frontend, terraform, delivery_config, containers]
    runs-on: ubuntu-latest
    steps:
      - name: Require every CI job to pass
        env:
          BACKEND_RESULT: ${{ needs.backend.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          TERRAFORM_RESULT: ${{ needs.terraform.result }}
          DELIVERY_CONFIG_RESULT: ${{ needs.delivery_config.result }}
          CONTAINERS_RESULT: ${{ needs.containers.result }}
        run: |
          test "$BACKEND_RESULT" = success
          test "$FRONTEND_RESULT" = success
          test "$TERRAFORM_RESULT" = success
          test "$DELIVERY_CONFIG_RESULT" = success
          test "$CONTAINERS_RESULT" = success
