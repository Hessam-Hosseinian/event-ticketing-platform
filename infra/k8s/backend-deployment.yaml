apiVersion: apps/v1
kind: Deployment
metadata: {name: backend}
spec:
  replicas: 3
  selector: {matchLabels: {app: backend}}
  template:
    metadata: {labels: {app: backend}}
    spec:
      containers:
      - name: backend
        image: registry.example/ticketing-backend:1.0
        ports: [{containerPort: 3000}]
        envFrom: [{configMapRef: {name: ticketing-config}}, {secretRef: {name: ticketing-secrets}}]
        readinessProbe: {httpGet: {path: /api/events, port: 3000}, initialDelaySeconds: 10}
        resources: {requests: {cpu: 100m, memory: 128Mi}, limits: {cpu: 1, memory: 512Mi}}
